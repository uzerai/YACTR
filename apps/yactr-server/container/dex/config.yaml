issuer: http://dex:5556/dex

storage:
  type: sqlite3
  config:
    file: /data/dex.db

web:
  http: 0.0.0.0:5556

enablePasswordDB: true

oauth2:
  passwordConnector: local

staticClients:
  - id: yactr-dev-client
    name: YACTR Dev Client
    secret: yactr-dev-secret
    redirectURIs:
      - http://localhost:8080/swagger/oauth2-redirect.html
      - http://localhost:5173/auth/callback
  - id: yactr-wrong-audience-client
    name: YACTR Wrong Audience Client
    secret: yactr-wrong-audience-secret
    redirectURIs:
      - http://localhost:8080/swagger/oauth2-redirect.html

staticPasswords:
  - email: dev@yactr.local
    # bcrypt hash for literal password: password
    hash: "$2a$10$2b2cU8CPhOTaGrs1HRQuAueS7JTT5ZHsHSzYiFPm1leZck7Mc8T4W"
    username: dev
    userID: "11111111-1111-1111-1111-111111111111"
    name: "YACTR Dev User"
    emailVerified: true
