name: yactr

services:
  database:
    image: postgis/postgis:18-3.6
    platform: linux/amd64
    environment:
      POSTGRES_DB: yactr
      POSTGRES_USER: yactr
      POSTGRES_PASSWORD: yactr
    ports:
      - "5432:5432"
    volumes:
      - database-data:/var/lib/postgresql
    profiles: [dev, full, test, server]

  file-bucket:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: yactr
      MINIO_ROOT_PASSWORD: playground
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - file-bucket-data:/data
    profiles: [dev, full, test, server]

  dex:
    image: dexidp/dex:v2.43.1
    command: ["dex", "serve", "/etc/dex/config.yaml"]
    ports:
      - "5556:5556"
    volumes:
      - ./apps/yactr-server/container/dex/config.yaml:/etc/dex/config.yaml:ro
      - dex-data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5556/dex/.well-known/openid-configuration"]
      interval: 5s
      timeout: 3s
      retries: 20
    profiles: [dev, full, server]

  api:
    build:
      context: ./apps/yactr-server
      dockerfile: container/yactr-api/Dockerfile
      target: runner
    ports:
      - "8080:8080"
    depends_on:
      database:
        condition: service_started
      file-bucket:
        condition: service_started
      dex:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Minio__Endpoint=file-bucket:9000
      - Minio__AccessKey=yactr
      - Minio__SecretKey=yactr
      - ConnectionStrings__DatabaseContextConnection=Host=database;Database=yactr;Username=yactr;Password=yactr;Port=5432
      - Auth0__Domain=http://dex:5556/dex
      - Auth0__Audience=yactr-dev-client
      - Auth0__Issuer=http://dex:5556/dex
    profiles: [full, server]

  client:
    image: oven/bun:1.3.10
    working_dir: /app
    command: sh -c "bun install && bun run dev --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./apps/yactr-client:/app
      - client-node-modules:/app/node_modules
    env_file:
      - path: ./apps/yactr-client/.env
        required: false
    environment:
      # container→container calls reach the API service directly over the compose network
      - YACTR_BASE_API_URL=http://api:8080
    depends_on:
      - api
    profiles: [full]

volumes:
  database-data:
  file-bucket-data:
  dex-data:
  client-node-modules:
