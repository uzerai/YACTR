# YACTR Workflow Add Or Update Api Endpoint

## Action

Follow the add-or-update-api-endpoint workflow:
1. Create or update endpoint handler file in src/YACTR.Api/Endpoints/{Entity}/
2. Update or create data mapper in src/YACTR.Api/Endpoints/{Entity}/{Entity}DataMapper.cs
3. Update or create request/response DTOs in src/YACTR.Api/Endpoints/{Entity}/
4. Update or create endpoint group in src/YACTR.Api/Endpoints/{Entity}/{Entity}EndpointGroup.cs
5. Update or create integration tests in tests/YACTR.Api.Tests/EndpointTests/{Entity}EntityEndpointsIntegrationTests.cs

## Evidence

- Workflow detected from commit patterns
- Frequency: ~3x per month
- Files: src/YACTR.Api/Endpoints/*/*.cs, src/YACTR.Api/Endpoints/*/*DataMapper.cs, src/YACTR.Api/Endpoints/*/*EndpointGroup.cs

