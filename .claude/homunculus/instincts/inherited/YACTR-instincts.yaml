# YACTR Workflow Database Schema Change With Migration

## Action

Follow the database-schema-change-with-migration workflow:
1. Update or create model/entity in src/YACTR.Domain/Model/**.cs
2. Generate and add migration in src/YACTR.Infrastructure/Database/Migrations/*.cs
3. Update table configuration in src/YACTR.Infrastructure/Database/Table/**.cs
4. Update repository or query extensions in src/YACTR.Infrastructure/Database/Repository/**.cs or QueryExtensions/**.cs
5. Update DatabaseContextModelSnapshot.cs
6. Update or create integration tests if needed

